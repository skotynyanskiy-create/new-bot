version: "3.8"

services:
  loky-bot:
    build: .
    container_name: loky-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"   # Health check
      - "9090:9090"   # Prometheus metrics
    volumes:
      - ./data:/app/data          # Persistent state (SQLite)
      - ./config.yaml:/app/config.yaml  # Config (editable without rebuild)
      - ./loky.log:/app/loky.log  # Log file
    environment:
      - PYTHONUNBUFFERED=1
    command: python src/main.py --capital 500 --log-level INFO
    # Per live trading, cambia command:
    # command: python src/main.py --capital 500 --live --log-level INFO
